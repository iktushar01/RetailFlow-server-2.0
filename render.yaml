# Dashboard services ignore this file unless deployed as a Blueprint.
# In Render Settings set:
# Root Directory = (empty)
# Build Command = npm install -g pnpm@10.34.4 && pnpm install --frozen-lockfile
# Start Command = node src/server.js
services:
  - type: web
    name: retailflow-server
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10.34.4 && pnpm install --frozen-lockfile
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
